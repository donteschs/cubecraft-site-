name: Generate Blog Article

on:
  schedule:
    - cron: "0 8 * * 1"
    - cron: "0 8 * * 3"
    - cron: "0 8 * * 5"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Check secret
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "ERROR: OPENAI_API_KEY secret is not set in GitHub repository settings"
            exit 1
          else
            echo "OPENAI_API_KEY is set (length: ${#OPENAI_API_KEY})"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 .github/scripts/generate-article.py

      - name: Commit and push
        run: |
          git config user.name "CubeCraft Bot"
          git config user.email "bot@cubecrafte.com"
          git add content/blog/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "blog: add new SEO article"
          git push
