name: Pinterest Auto-Pin

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 9 * * *"
    - cron: "0 11 * * *"
    - cron: "0 13 * * *"
    - cron: "0 15 * * *"
    - cron: "0 17 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - name: Post Pinterest pin
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -X GET "https://cubecrafte.com/api/cron/pin" \
            -H "Authorization: Bearer ${CRON_SECRET}"
