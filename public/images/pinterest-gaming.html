<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1000px; height: 1500px; overflow: hidden; font-family: 'Arial Black', sans-serif; }

  .pin {
    width: 1000px;
    height: 1500px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .pin img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 65%;
  }

  /* Couvre le texte anglais en haut */
  .top-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 480px;
    z-index: 2;
    background: linear-gradient(to bottom, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.95) 50%, rgba(0,0,0,0.4) 80%, transparent 100%);
  }

  .top-badge {
    position: absolute;
    top: 40px;
    left: 40px;
    z-index: 3;
    background: #4CAF50;
    border-radius: 100px;
    padding: 16px 32px;
    font-size: 28px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    color: #fff;
  }

  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    z-index: 3;
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 12px 24px;
    font-size: 26px;
    font-weight: 900;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    color: #455A64;
  }
  .logo span { color: #4CAF50; }

  .overlay {
    position: relative;
    z-index: 3;
    padding: 60px 52px 52px;
    background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.7) 45%, transparent 100%);
  }

  .tag {
    color: #4CAF50;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: monospace;
  }

  .headline {
    color: #fff;
    font-size: 72px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .headline em {
    color: #4CAF50;
    font-style: normal;
  }

  .sub {
    color: rgba(255,255,255,0.65);
    font-size: 30px;
    line-height: 1.5;
    margin-bottom: 40px;
    font-family: Arial, sans-serif;
    font-weight: 400;
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
  }
  .price-new { color: #FFB300; font-size: 52px; font-weight: 900; }
  .price-old { color: #666; font-size: 32px; text-decoration: line-through; }
  .discount {
    background: #E60023;
    color: #fff;
    font-size: 24px;
    font-weight: 900;
    padding: 8px 20px;
    border-radius: 50px;
  }

  .cta {
    background: #4CAF50;
    color: #fff;
    font-size: 34px;
    font-weight: 900;
    padding: 28px 52px;
    border-radius: 100px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
</style>
</head>
<body>
<div class="pin">
  <img src="https://res.cloudinary.com/druvbvnob/image/upload/v1776822810/main-image-3_bgmt6p.jpg" />
  <div class="top-overlay"></div>
  <div class="top-badge">⛏️ Minecraft IRL</div>
  <div class="logo">CUBE<span>CRAFT</span></div>
  <div class="overlay">
    <div class="tag">Jouet magnétique N52</div>
    <div class="headline">Construis ton<br><em>monde.</em></div>
    <div class="sub">Cubes magnétiques inspirés de Minecraft. Certifié CE &amp; EN 71. Dès 6 ans.</div>
    <div class="price-row">
      <div class="price-new">39,90 €</div>
      <div class="price-old">59,90 €</div>
      <div class="discount">-30%</div>
    </div>
    <div class="cta">Commander maintenant →</div>
  </div>
</div>
</body>
</html>
